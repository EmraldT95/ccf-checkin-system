services:
  backend:
    image: mcr.microsoft.com/devcontainers/go:1-bookworm
    container_name: ccf-backend
    ports:
      - 8001:8000
    volumes:
      - ../:/backend
    stdin_open: true
    tty: true
    depends_on:
      - db

  db:
    image: postgres:18.2
    container_name: ccf-backend-db
    ports:
      - 5433:5432
    # set shared memory limit when using docker compose
    shm_size: 128mb
    env_file: ../.local.env
    volumes:
      - ./database:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]

networks:
  default:
    name: ccf
    external: true
